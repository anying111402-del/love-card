<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>婷</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Noto Serif SC','STSong',serif;background:#0d0d0d;height:100dvh;width:100vw;overflow:hidden;color:#e8d5c4}
body{position:fixed;top:0;left:0}

/* ===== SCREEN 1: OPENING ===== */
#screen-opening{z-index:10;background:#0d0d0d;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent}
#screen-opening .center{text-align:center;position:relative}
.opening-name{font-size:clamp(56px,15vw,96px);font-weight:300;color:#e8d5c4;letter-spacing:16px;opacity:0;transform:scale(.95);transition:all 1.2s cubic-bezier(.22,1,.36,1)}
.opening-name.show{opacity:1;transform:scale(1)}
.opening-name .glow{position:absolute;top:50%;left:50%;width:200px;height:200px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(212,163,115,.12) 0%,transparent 70%);pointer-events:none}
.opening-line{width:0;height:1px;background:linear-gradient(90deg,transparent,#d4a373,transparent);margin:20px auto 0;transition:width 1.2s cubic-bezier(.22,1,.36,1) .5s}
.opening-line.show{width:60px}
.opening-hint{color:rgba(232,213,196,.3);font-size:12px;letter-spacing:6px;margin-top:32px;opacity:0;transition:opacity .8s .8s}
.opening-hint.show{opacity:1}
.opening-hint span{animation:hintPulse 2.5s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ===== MUSIC TOGGLE ===== */
.music-toggle{position:fixed;top:20px;right:20px;z-index:50;width:36px;height:36px;border-radius:50%;border:1px solid rgba(212,163,115,.2);background:rgba(13,13,13,.6);backdrop-filter:blur(10px);color:#d4a373;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .3s;opacity:0;user-select:none;-webkit-tap-highlight-color:transparent}
.music-toggle.show{display:flex;opacity:1}
.music-toggle:active{transform:scale(.9)}
.music-toggle.playing{background:rgba(212,163,115,.15);border-color:rgba(212,163,115,.4)}

/* ===== PARTICLE CANVAS ===== */
#particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1;opacity:0;transition:opacity 1.5s}
#particle-canvas.show{opacity:1}

/* ===== SCREEN 2: MAIN ===== */
#screen-main{z-index:5;overflow-y:auto;justify-content:flex-start;display:none;background:#0d0d0d}
#screen-main.active{display:flex}
#screen-main::-webkit-scrollbar{width:0;height:0}

.scroll-content{position:relative;z-index:2;width:100%;min-height:100%;padding:0 20px;display:flex;flex-direction:column;align-items:center}

.spacer{height:50vh}
.spacer-sm{height:25vh}

.reveal{opacity:0;transform:translateY(40px);filter:blur(6px);transition:all 1s cubic-bezier(.22,1,.36,1)}
.reveal.visible{opacity:1;transform:translateY(0);filter:blur(0)}
.reveal-d1{transition-delay:0s}
.reveal-d2{transition-delay:.15s}
.reveal-d3{transition-delay:.3s}
.reveal-d4{transition-delay:.45s}
.reveal-d5{transition-delay:.6s}

/* Letter */
.content-block{width:100%;max-width:420px;padding:0 4px}
.letter-line{text-align:center;margin:8px 0}
.letter-line .text{font-size:18px;line-height:2;letter-spacing:3px;color:#e8d5c4}
.letter-line .text.large{font-size:22px;font-weight:400}
.letter-line .text.bold{font-weight:600}
.letter-line .text.accent{color:#d4a373}
.letter-line .text.subtle{color:rgba(232,213,196,.5);font-size:14px}
.divider-line{margin:40px auto;width:40px;height:1px;background:linear-gradient(90deg,transparent,#d4a373,transparent);opacity:.5}
.letter-card{background:rgba(255,255,255,.03);border:1px solid rgba(212,163,115,.12);border-radius:16px;padding:40px 28px;width:100%;backdrop-filter:blur(20px)}
.letter-card .letter-line .text{font-size:17px;letter-spacing:2px;line-height:2.2}
.letter-card .letter-line{margin:6px 0}

/* Forgiveness */
.forgive-block{text-align:center;width:100%;max-width:420px;padding:0 4px}
.forgive-title{font-size:28px;color:#e8d5c4;letter-spacing:8px;font-weight:300}
.forgive-title .accent{color:#d4a373;font-weight:600}
.forgive-sub{color:rgba(232,213,196,.4);font-size:13px;letter-spacing:3px;margin-top:14px}
.btn-group{display:flex;justify-content:center;gap:20px;margin-top:36px;flex-wrap:wrap;position:relative;min-height:60px;align-items:center}
.btn{position:relative;padding:12px 40px;border-radius:30px;font-size:15px;border:none;cursor:pointer;transition:all .35s cubic-bezier(.22,1,.36,1);font-weight:400;letter-spacing:4px;-webkit-tap-highlight-color:transparent;user-select:none;font-family:'Noto Serif SC','STSong',serif;background:transparent;outline:none}
.btn-yes{background:rgba(212,163,115,.15);color:#d4a373;border:1px solid rgba(212,163,115,.3);backdrop-filter:blur(10px)}
.btn-yes:hover,.btn-yes:active{background:rgba(212,163,115,.25);transform:scale(1.03)}
.btn-no{color:rgba(232,213,196,.3);border:1px solid rgba(232,213,196,.1);position:absolute}
.btn-no.dodging{transition:left .1s ease,top .1s ease}
.btn-no.caught{background:rgba(212,163,115,.15);color:#d4a373;border-color:rgba(212,163,115,.3);position:relative;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}

/* Celebration */
.celebration-block{text-align:center;width:100%;max-width:420px;padding:0 0 40px;display:none;flex-direction:column;align-items:center}
.celebration-block .main-text{font-size:28px;letter-spacing:6px;color:#e8d5c4;font-weight:300}
.celebration-block .main-text .highlight{background:linear-gradient(135deg,#d4a373,#e8c84a,#d4a373);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:goldShimmer 3s linear infinite;font-weight:600}
@keyframes goldShimmer{to{background-position:200% center}}
.celebration-block .sub-text{color:rgba(232,213,196,.4);font-size:15px;margin-top:14px;letter-spacing:3px}

/* Couple illustration canvas */
#couple-canvas{width:100%;max-width:280px;height:180px;margin:30px auto 10px;display:block;opacity:0;transition:opacity 1s}
#couple-canvas.show{opacity:1}

/* Scroll progress */
.scroll-progress{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,#d4a373,transparent);z-index:50;width:0;transition:width .1s;opacity:0}
.scroll-progress.show{opacity:1}

/* Burst canvas */
#burst-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;display:none}
#burst-canvas.active{display:block}

@media(max-width:420px){
  .letter-card{padding:30px 20px}
  .letter-card .letter-line .text{font-size:16px}
  .forgive-title{font-size:24px}
  .btn{padding:10px 32px;font-size:14px}
}
</style>
</head>
<body>

<div class="scroll-progress" id="scrollProgress"></div>
<button class="music-toggle" id="musicToggle">♫</button>

<!-- SCREEN 1: OPENING -->
<div id="screen-opening" class="screen active">
  <div class="center">
    <div class="opening-name" id="openingName">
      婷
      <div class="glow"></div>
    </div>
    <div class="opening-line" id="openingLine"></div>
    <div class="opening-hint" id="openingHint"><span>轻触屏幕</span></div>
  </div>
</div>

<!-- SCREEN 2: MAIN -->
<div id="screen-main" class="screen">
  <canvas id="particle-canvas"></canvas>

  <div class="scroll-content" id="scrollContent">

    <div class="spacer"></div>

    <div class="content-block">
      <div class="letter-card">
        <div class="letter-line"><span class="text reveal" id="line1">亲爱的婷：</span></div>
        <div style="height:20px"></div>
        <div class="letter-line"><span class="text reveal reveal-d1" id="line2">我上夜班情绪波动比较大，</span></div>
        <div class="letter-line"><span class="text reveal reveal-d2" id="line3">我们都没错对吧，</span></div>
        <div style="height:12px"></div>
        <div class="letter-line"><span class="text reveal reveal-d3 large bold" id="line4">想你。</span></div>
        <div style="height:16px"></div>
        <div class="letter-line"><span class="text reveal reveal-d4 subtle" id="line5">—— 颖</span></div>
      </div>
    </div>

    <div class="spacer-sm"></div>

    <div class="reveal" id="dividerReveal">
      <div class="divider-line"></div>
    </div>

    <div class="spacer-sm"></div>

    <div class="forgive-block">
      <div class="forgive-title reveal" id="forgiveTitle">和好，<span class="accent">好吗</span>？</div>
      <div class="forgive-sub reveal reveal-d1" id="forgiveSub">夜班再难熬，有你就不一样了</div>
      <div class="btn-group reveal reveal-d2" id="btnGroup">
        <button class="btn btn-yes" id="btnYes">好</button>
        <button class="btn btn-no" id="btnNo">不要</button>
      </div>
    </div>

    <div style="height:10px"></div>

    <div class="celebration-block" id="celebrationBlock">
      <canvas id="couple-canvas"></canvas>
      <div class="main-text reveal">只想和你 <span class="highlight">一直在一起</span></div>
      <div class="sub-text reveal reveal-d1">—— 颖</div>
    </div>

    <div class="spacer"></div>

  </div>
</div>

<canvas id="burst-canvas"></canvas>

<script>
// ============================================================
// CONFIG
// ============================================================
const CONFIG = {
  sender: '颖',
  recipient: '婷',
  letter: `我上夜班情绪波动比较大，

我们都没错对吧，

想你。`
};

// ============================================================
// SCREEN 1: OPENING
// ============================================================
const openingName = document.getElementById('openingName');
const openingLine = document.getElementById('openingLine');
const openingHint = document.getElementById('openingHint');
const screenOpening = document.getElementById('screen-opening');
const screenMain = document.getElementById('screen-main');
const scrollProgress = document.getElementById('scrollProgress');

setTimeout(() => openingName.classList.add('show'), 300);
setTimeout(() => openingLine.classList.add('show'), 900);
setTimeout(() => openingHint.classList.add('show'), 1500);

screenOpening.addEventListener('click', () => {
  screenOpening.style.transition = 'opacity .6s';
  screenOpening.style.opacity = '0';
  setTimeout(() => {
    screenOpening.classList.remove('active');
    screenOpening.style.opacity = '1';
    screenMain.classList.add('active');
    scrollProgress.classList.add('show');
    initMain();
    startMusic();
  }, 600);
});

// ============================================================
// MUSIC — Web Audio API
// ============================================================
let audioCtx = null;
let musicPlaying = false;
let musicTimeout = null;
const musicToggle = document.getElementById('musicToggle');

function startMusic() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    playMelody();
    musicPlaying = true;
    musicToggle.classList.add('show','playing');
  } catch(e) { console.log('Audio unavailable'); }
}

musicToggle.addEventListener('click', () => {
  if (!audioCtx) return;
  if (musicPlaying) {
    musicPlaying = false;
    musicToggle.classList.remove('playing');
    if (musicTimeout) { clearTimeout(musicTimeout); musicTimeout = null; }
  } else {
    musicPlaying = true;
    musicToggle.classList.add('playing');
    playMelody();
  }
});

// Pentatonic melody
const PENTA = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25];
const MELODY = [
  0,2,4,3, 2,0,3,4, 5,4,3,2, 1,2,3,0,
  0,3,5,4, 3,2,1,0, 2,4,5,4, 3,2,0,-1,
  2,4,5,5, 4,3,2,1, 0,2,4,3, 2,0,2,0,
  0,3,5,5, 4,2,0,2, 4,5,6,5, 4,2,1,0
];
const NOTE_DURATION = 0.45;
const VOLUME = 0.12;

function playNote(freq, startTime, duration) {
  if (!audioCtx || freq <= 0) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;

  // Soft bell-like envelope
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(VOLUME, startTime + 0.02);
  gain.gain.exponentialRampToValueAtTime(VOLUME * 0.3, startTime + duration * 0.6);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

  // Add a subtle harmonic for richness
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;
  gain2.gain.setValueAtTime(0, startTime);
  gain2.gain.linearRampToValueAtTime(VOLUME * 0.08, startTime + 0.03);
  gain2.gain.exponentialRampToValueAtTime(0.001, startTime + duration * 0.7);

  osc.connect(gain);
  osc2.connect(gain2);
  gain.connect(audioCtx.destination);
  gain2.connect(audioCtx.destination);

  osc.start(startTime);
  osc2.start(startTime);
  osc.stop(startTime + duration);
  osc2.stop(startTime + duration);
}

function playMelody() {
  if (!musicPlaying || !audioCtx) return;
  const now = audioCtx.currentTime;
  let time = 0;

  for (let i = 0; i < MELODY.length; i++) {
    const noteIdx = MELODY[i];
    if (noteIdx >= 0 && noteIdx < PENTA.length) {
      playNote(PENTA[noteIdx], now + time, NOTE_DURATION * 0.9);
    }
    time += NOTE_DURATION;
  }

  // Schedule repeat
  const totalDuration = MELODY.length * NOTE_DURATION;
  musicTimeout = setTimeout(() => { playMelody(); }, totalDuration * 1000);
}

// ============================================================
// PARTICLES
// ============================================================
const particleCanvas = document.getElementById('particle-canvas');
const ctx = particleCanvas.getContext('2d');
let W, H;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  particleCanvas.width = W;
  particleCanvas.height = H;
}
resize();
window.addEventListener('resize', resize);

const PARTICLES = [];
const NUM_P = 50;
const CONNECT_DIST = 130;

class GlowDot {
  constructor() { this.reset(true); }
  reset(init) {
    this.x = Math.random() * W;
    this.y = init ? Math.random() * H : H + 10;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = -(0.2 + Math.random() * 0.4);
    this.r = 1 + Math.random() * 2;
    this.alpha = 0.2 + Math.random() * 0.4;
    this.pulse = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.01 + Math.random() * 0.02;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.pulse += this.pulseSpeed;
    if (this.y < -20 || this.x < -20 || this.x > W + 20) this.reset(false);
  }
  draw() {
    const a = this.alpha * (0.7 + 0.3 * Math.sin(this.pulse));
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(212,163,115,${a})`;
    ctx.fill();
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 3);
    grad.addColorStop(0, `rgba(212,163,115,${a * 0.3})`);
    grad.addColorStop(1, 'rgba(212,163,115,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initParticles() {
  for (let i = 0; i < NUM_P; i++) PARTICLES.push(new GlowDot());
  document.getElementById('particle-canvas').classList.add('show');
  function loop() {
    ctx.clearRect(0, 0, W, H);
    for (let i = 0; i < PARTICLES.length; i++) {
      for (let j = i + 1; j < PARTICLES.length; j++) {
        const dx = PARTICLES[i].x - PARTICLES[j].x;
        const dy = PARTICLES[i].y - PARTICLES[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < CONNECT_DIST) {
          const a = (1 - dist / CONNECT_DIST) * 0.12;
          ctx.beginPath();
          ctx.moveTo(PARTICLES[i].x, PARTICLES[i].y);
          ctx.lineTo(PARTICLES[j].x, PARTICLES[j].y);
          ctx.strokeStyle = `rgba(212,163,115,${a})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    PARTICLES.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(loop);
  }
  loop();
}

// ============================================================
// COUPLE ILLUSTRATION
// ============================================================
const coupleCanvas = document.getElementById('couple-canvas');
const coupleCtx = coupleCanvas.getContext('2d');

function drawCouple() {
  const rect = coupleCanvas.parentElement.getBoundingClientRect();
  const w = Math.min(280, rect.width - 20);
  const h = 180;
  const dpr = window.devicePixelRatio || 1;
  coupleCanvas.width = w * dpr;
  coupleCanvas.height = h * dpr;
  coupleCanvas.style.width = w + 'px';
  coupleCanvas.style.height = h + 'px';
  coupleCtx.scale(dpr, dpr);

  const cx = w / 2;
  const cy = h / 2 + 20;
  const t = Date.now() * 0.001;

  coupleCtx.clearRect(0, 0, w, h);

  // Left person (颖)
  const lx = cx - 35;
  // Right person (婷)
  const rx = cx + 35;

  // Gentle sway
  const sway = Math.sin(t * 0.8) * 2;

  // Draw left person
  drawPerson(coupleCtx, lx, cy, sway, '#d4a373');
  // Draw right person
  drawPerson(coupleCtx, rx, cy, -sway, '#e8a4b8');

  // Connecting hearts floating up
  for (let i = 0; i < 5; i++) {
    const ht = (t * 0.5 + i * 1.2) % 5;
    const hy = cy - 70 - ht * 12;
    const hx = cx + Math.sin(t + i * 2) * 20;
    const ha = Math.max(0, 1 - ht / 5);
    coupleCtx.save();
    coupleCtx.globalAlpha = ha * 0.4;
    coupleCtx.fillStyle = '#d4a373';
    coupleCtx.font = '10px sans-serif';
    coupleCtx.textAlign = 'center';
    coupleCtx.fillText('♥', hx, hy);
    coupleCtx.restore();
  }
}

function drawPerson(c, x, y, sway, color) {
  c.save();
  c.translate(x, y);
  c.rotate(sway * 0.02);

  // Head
  c.beginPath();
  c.arc(0, -30, 12, 0, Math.PI * 2);
  c.strokeStyle = color;
  c.lineWidth = 2;
  c.globalAlpha = 0.6;
  c.stroke();

  // Body
  c.beginPath();
  c.moveTo(0, -18);
  c.lineTo(0, 10);
  c.stroke();

  // Arms
  c.beginPath();
  c.moveTo(-10, -5);
  c.lineTo(10, -5);
  c.stroke();

  // Legs
  c.beginPath();
  c.moveTo(0, 10);
  c.lineTo(-8, 28);
  c.moveTo(0, 10);
  c.lineTo(8, 28);
  c.stroke();

  c.restore();
}

// ============================================================
// INIT
// ============================================================
let forgiveActive = false;
let dodgeCount = 0;
const maxDodges = 5;

function initMain() {
  initParticles();
  initButtons();

  // Scroll progress
  screenMain.addEventListener('scroll', () => {
    const st = screenMain.scrollTop;
    const sh = screenMain.scrollHeight - screenMain.clientHeight;
    scrollProgress.style.width = (sh > 0 ? (st / sh) * 100 : 0) + '%';
  });

  // Intersection Observer
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.2 });

  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

  // Draw couple canvas periodically
  setInterval(drawCouple, 50);
}

function initButtons() {
  forgiveActive = true;
  const btnNo = document.getElementById('btnNo');
  btnNo.addEventListener('click', dodgeBtn);
  document.getElementById('btnYes').addEventListener('click', sayYes);
  btnNo.addEventListener('touchstart', (e) => {
    if (forgiveActive) { e.preventDefault(); dodgeBtn(); }
  });
}

function dodgeBtn() {
  const btn = document.getElementById('btnNo');
  if (!forgiveActive) return;
  dodgeCount++;
  btn.classList.add('dodging');

  if (dodgeCount >= maxDodges) {
    btn.textContent = '好 🥺';
    btn.classList.remove('dodging');
    btn.classList.add('caught');
    forgiveActive = false;
    btn.style.position = 'relative';
    btn.style.left = 'auto';
    btn.style.top = 'auto';
    setTimeout(() => { sayYes(); }, 1200);
    return;
  }

  const group = document.getElementById('btnGroup');
  const gRect = group.getBoundingClientRect();
  const bRect = btn.getBoundingClientRect();

  let newX, newY;
  if (dodgeCount < 3) {
    newX = Math.random() * Math.max(gRect.width - bRect.width - 10, 40);
    newY = Math.random() * Math.max(gRect.height - bRect.height - 10, 40);
    btn.textContent = ['不要嘛','不行不行','哎呀'][dodgeCount - 1];
  } else {
    btn.textContent = ['你好执着','好吧好吧','那好吧🥺'][dodgeCount - 3];
    newX = gRect.width / 2 - bRect.width / 2 + (Math.random() - 0.5) * 60;
    newY = gRect.height / 2 - bRect.height / 2 + (Math.random() - 0.5) * 30;
  }

  btn.style.position = 'absolute';
  btn.style.left = Math.max(0, newX) + 'px';
  btn.style.top = Math.max(0, newY) + 'px';
}

function sayYes() {
  forgiveActive = false;
  const fb = document.querySelector('.forgive-block');
  fb.style.transition = 'opacity .6s, transform .6s';
  fb.style.opacity = '0';
  fb.style.transform = 'translateY(20px)';

  setTimeout(() => {
    fb.style.display = 'none';
    const cb = document.getElementById('celebrationBlock');
    cb.style.display = 'flex';
    cb.querySelectorAll('.reveal').forEach(el => {
      setTimeout(() => el.classList.add('visible'), 100);
    });
    // Show couple illustration
    const cc = document.getElementById('couple-canvas');
    cc.classList.add('show');
    drawCouple();
    startLightBurst();
  }, 600);
}

// ============================================================
// LIGHT BURST
// ============================================================
const burstCanvas = document.getElementById('burst-canvas');
const burstCtx = burstCanvas.getContext('2d');
let bW, bH, burstActive = false;
let rays = [];

function resizeBurst() {
  bW = window.innerWidth;
  bH = window.innerHeight;
  burstCanvas.width = bW;
  burstCanvas.height = bH;
}
resizeBurst();
window.addEventListener('resize', resizeBurst);

class LightRay {
  constructor() {
    this.angle = Math.random() * Math.PI * 2;
    this.len = 50 + Math.random() * 200;
    this.speed = 0.2 + Math.random() * 0.6;
    this.width = 1 + Math.random() * 2;
    this.alpha = 0;
    this.target = 0.1 + Math.random() * 0.2;
    this.growing = true;
    this.done = false;
  }
  update() {
    if (this.growing) { this.alpha += 0.01; if (this.alpha >= this.target) this.growing = false; }
    else { this.alpha -= 0.003; if (this.alpha <= 0) this.done = true; }
  }
  draw(c, cx, cy) {
    if (this.alpha <= 0) return;
    c.save();
    c.translate(cx, cy);
    c.rotate(this.angle);
    c.globalAlpha = this.alpha;
    const g = c.createLinearGradient(0, 0, this.len, 0);
    g.addColorStop(0, 'rgba(212,163,115,0.6)');
    g.addColorStop(0.5, 'rgba(212,163,115,0.15)');
    g.addColorStop(1, 'rgba(212,163,115,0)');
    c.fillStyle = g;
    c.fillRect(0, -this.width / 2, this.len, this.width);
    c.restore();
  }
}

function startLightBurst() {
  burstCanvas.classList.add('active');
  burstActive = true;
  const cx = bW / 2, cy = bH / 2;
  for (let i = 0; i < 40; i++) rays.push(new LightRay());
  let frame = 0, maxF = 200;
  function loop() {
    if (!burstActive) return;
    burstCtx.clearRect(0, 0, bW, bH);
    const ga = Math.max(0, 1 - frame / maxF);
    const gs = 100 + frame * 2;
    const g = burstCtx.createRadialGradient(cx, cy, 0, cx, cy, gs);
    g.addColorStop(0, `rgba(212,163,115,${ga * 0.15})`);
    g.addColorStop(0.5, `rgba(212,163,115,${ga * 0.05})`);
    g.addColorStop(1, 'rgba(212,163,115,0)');
    burstCtx.fillStyle = g;
    burstCtx.fillRect(0, 0, bW, bH);
    if (frame < 80 && frame % 4 === 0) rays.push(new LightRay());
    rays.forEach(r => { r.update(); r.draw(burstCtx, cx, cy); });
    rays = rays.filter(r => !r.done);
    frame++;
    if (frame < maxF || rays.length > 0) requestAnimationFrame(loop);
    else burstCanvas.classList.remove('active');
  }
  loop();
}
</script>
